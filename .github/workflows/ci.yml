name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "8.1"
            symfony-deps: "6.4"
          - php: "8.2"
            symfony-deps: "6.4"
          - php: "8.3"
            symfony-deps: "6.4"
          - php: "8.4"
            symfony-deps: "6.4"
          - php: "8.2"
            symfony-deps: "7"
          - php: "8.3"
            symfony-deps: "7"
          - php: "8.4"
            symfony-deps: "7"

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Validate composer.json
        run: composer composer-validate

      # Fresh checkouts have no composer.lock; Composer 2.x refuses a partial
      # `composer update pkg:constraint ...` until a lock file exists. Narrow
      # Symfony constraints in composer.json, then run a full update.
      - name: Install dependencies (Symfony ${{ matrix.symfony-deps }}.x)
        run: |
          set -eux
          if [ "${{ matrix.symfony-deps }}" = "7" ]; then
            SF='^7.0'
          else
            SF='^6.4'
          fi
          perl -pi -e 's/"\^6\.4 \|\| \^7\.0"/"'"${SF}"'"/g' composer.json
          composer update --no-interaction --prefer-dist --with-all-dependencies

      - name: Run PHPUnit
        run: vendor/bin/phpunit
